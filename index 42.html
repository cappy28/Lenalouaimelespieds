<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #scene {
    position: relative;
    width: 100%;
    height: 540px;
    background: linear-gradient(135deg, #007a5e 0% 33%, #ce1126 33% 66%, #fcd116 66% 100%);
    overflow: hidden;
    font-family: 'Fredoka One', cursive;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0 2px, transparent 2px 14px);
    pointer-events: none;
  }

  .pied-wrap {
    position: absolute;
    pointer-events: none;
    animation: piedAnim var(--dur) ease-in-out forwards;
    transform-origin: center center;
  }

  .pied-wrap img {
    display: block;
    border-radius: 12px;
    object-fit: cover;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    /* flip horizontal si nécessaire */
    transform: var(--img-flip, none);
  }

  @keyframes piedAnim {
    0%   { transform: translateY(-120px) rotate(var(--rot)) scale(0.2); opacity: 0; }
    15%  { opacity: 1; transform: translateY(0) rotate(var(--rot)) scale(1.3); }
    28%  { transform: translateY(-18px) rotate(var(--rot)) scale(1); }
    40%  { transform: translateY(8px) rotate(var(--rot)) scale(1); }
    55%  { transform: translateY(-4px) rotate(var(--rot)) scale(1); }
    70%  { transform: translateY(0px) rotate(var(--rot)) scale(1); opacity: 1; }
    85%  { opacity: 0.9; }
    100% { transform: translateY(0px) rotate(var(--rot)) scale(1); opacity: 0; }
  }

  .compliment-bubble {
    position: absolute;
    background: rgba(0,0,0,0.45);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 15px;
    color: #fff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    pointer-events: none;
    animation: popCompliment 4.2s ease-in-out forwards;
    max-width: 240px;
    white-space: normal;
    text-align: center;
    line-height: 1.3;
  }

  @keyframes popCompliment {
    0%   { transform: scale(0) rotate(var(--rot)); opacity: 0; }
    18%  { transform: scale(1.15) rotate(var(--rot)); opacity: 1; }
    35%  { transform: scale(0.97) rotate(var(--rot)); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: scale(1) rotate(var(--rot)); opacity: 0; }
  }

  .center-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 22px;
    padding: 18px 28px;
    text-align: center;
    z-index: 20;
    animation: cardPulse 3s ease-in-out infinite;
  }
  @keyframes cardPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%     { transform: translate(-50%,-50%) scale(1.04); }
  }
  .crown { font-size: 38px; line-height: 1; }
  .title { font-size: 34px; color: #fcd116; text-shadow: 2px 2px 0 #007a5e; letter-spacing: 2px; margin-top: 4px; }
  .sub   { font-size: 17px; color: #fff; margin-top: 2px; letter-spacing: 1px; }
  .flag-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
  .mini-flag { display: flex; width: 54px; height: 34px; border-radius: 4px; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.5); position: relative; }
  .mini-flag span { flex: 1; }
  .mini-flag .fstar { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; }

  .counter { position: absolute; bottom: 12px; right: 16px; font-size: 15px; color: rgba(255,255,255,0.85); text-shadow: 1px 1px 0 rgba(0,0,0,0.4); }

  .confetti {
    position: absolute;
    border-radius: 2px;
    pointer-events: none;
    animation: cFall linear forwards;
  }
  @keyframes cFall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(560px) rotate(600deg); opacity: 0; }
  }
</style>

<div id="scene">
  <div class="overlay"></div>

  <div class="center-card">
    <div class="crown">👑</div>
    <div class="title">Lena la Reine</div>
    <div class="sub">La Queen du Cameroun 🇨🇲</div>
    <div class="flag-row">
      <div class="mini-flag">
        <span style="background:#007a5e"></span>
        <span style="background:#ce1126"></span>
        <span style="background:#fcd116"></span>
        <span class="fstar">⭐</span>
      </div>
    </div>
  </div>

  <div class="counter" id="ctr">🦶 0 pieds</div>
</div>

<script>
const scene = document.getElementById('scene');
const ctr = document.getElementById('ctr');
let total = 0;

// Vraies photos de pieds depuis Unsplash (libres de droits, pas de signup requis)
// Format: https://images.unsplash.com/photo-ID?w=120&h=140&fit=crop&auto=format
const footPhotos = [
  'https://images.unsplash.com/photo-1519415510236-718bdfcd89c8?w=120&h=140&fit=crop&auto=format', // pieds sur sable
  'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=120&h=140&fit=crop&auto=format', // pieds avec vernis
  'https://images.unsplash.com/photo-1506126279646-a697353d3166?w=120&h=140&fit=crop&auto=format', // pieds plage
  'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=120&h=140&fit=crop&auto=format', // chaussure/pied
  'https://images.unsplash.com/photo-1594498653385-d5172c532c00?w=120&h=140&fit=crop&auto=format', // pieds vernis rouge
  'https://images.unsplash.com/photo-1607867908022-7d83b52ebf37?w=120&h=140&fit=crop&auto=format', // pieds sable
  'https://images.unsplash.com/photo-1612635207072-b2c3f776cd9a?w=120&h=140&fit=crop&auto=format', // pieds eau
  'https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=120&h=140&fit=crop&auto=format', // pieds bain
  'https://images.unsplash.com/photo-1574169208507-84376144848b?w=120&h=140&fit=crop&auto=format', // pieds colorés
  'https://images.unsplash.com/photo-1560807707-8cc77767d783?w=120&h=140&fit=crop&auto=format', // pieds mer
];

const compliments = [
  '👑 T\'es la plus belle !',
  '✨ Tu rayonnes Lena !',
  '💛 Trop magnifique !',
  '🌹 Une vraie déesse !',
  '💎 La perfection c\'est toi',
  '🔥 Tellement stylée !',
  '🌟 Tu brilles fort !',
  '💚 Beauté naturelle !',
  '👸 Notre Queen adorée',
  '💋 Irrésistible Lena !',
  '🏆 La meilleure de toutes',
  '🌺 Fleur du Cameroun !',
  '✨ Élégante & puissante',
  '💫 Tu illumines tout',
  '❤️ On t\'adore Lena !',
  '🦋 Belle comme un rêve',
  '🌸 Trop trop belle !!',
  '👑 Reine incontestée !',
  '💪 Forte & magnifique',
  '🎀 La plus swag de toutes',
];

const bubbleColors = [
  'rgba(0,122,94,0.75)',
  'rgba(206,17,38,0.75)',
  'rgba(180,140,0,0.75)',
  'rgba(100,50,160,0.7)',
  'rgba(0,80,180,0.7)',
];

const confColors = ['#007a5e','#ce1126','#fcd116','#fff','#ff9eb5','#a78bfa'];

function rand(a,b){ return Math.random()*(b-a)+a; }

function spawnPied() {
  const wrap = document.createElement('div');
  wrap.className = 'pied-wrap';

  const x    = rand(2, 80);
  const y    = rand(2, 72);
  const rot  = rand(-50, 50);
  const size = rand(70, 115);
  const flip = Math.random() > 0.5;
  const dur  = rand(3.2, 4.2).toFixed(1) + 's';

  // Choisir une vraie photo aléatoire
  const photoUrl = footPhotos[Math.floor(Math.random() * footPhotos.length)];

  wrap.style.left = x + '%';
  wrap.style.top  = y + '%';
  wrap.style.setProperty('--rot', rot + 'deg');
  wrap.style.setProperty('--dur', dur);

  // Créer l'élément img
  const img = document.createElement('img');
  img.src    = photoUrl;
  img.width  = Math.round(size);
  img.height = Math.round(size * 1.17);
  img.alt    = 'pied';
  img.draggable = false;

  // Miroir horizontal aléatoire directement sur l'img
  if (flip) img.style.transform = 'scaleX(-1)';

  wrap.appendChild(img);
  scene.appendChild(wrap);

  total++;
  ctr.textContent = '🦶 ' + total + ' pieds !';
  setTimeout(() => wrap.remove(), 4400);
}

function spawnCompliment() {
  const el = document.createElement('div');
  el.className = 'compliment-bubble';
  el.style.left = rand(2, 68) + '%';
  el.style.top  = rand(3, 75) + '%';
  el.style.setProperty('--rot', rand(-12, 12) + 'deg');
  el.style.background = bubbleColors[Math.floor(Math.random()*bubbleColors.length)];
  el.style.fontSize = rand(13, 19) + 'px';
  el.textContent = compliments[Math.floor(Math.random()*compliments.length)];
  scene.appendChild(el);
  setTimeout(() => el.remove(), 4300);
}

function spawnConfetti() {
  for (let i = 0; i < 8; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = rand(0,100) + '%';
    c.style.top  = '-12px';
    c.style.width  = rand(7,13) + 'px';
    c.style.height = rand(7,13) + 'px';
    c.style.background = confColors[Math.floor(Math.random()*confColors.length)];
    c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    c.style.animationDuration = rand(2,4.5) + 's';
    scene.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

function burst() {
  const n = Math.floor(rand(3, 7));
  for (let i = 0; i < n; i++) setTimeout(spawnPied, i * 160);
  const nc = Math.floor(rand(2, 5));
  for (let i = 0; i < nc; i++) setTimeout(spawnCompliment, i * 200 + 100);
  spawnConfetti();
}

burst();
setInterval(burst, 3000);
</script>
