
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #scene {
    position: relative;
    width: 100%;
    height: 540px;
    background: linear-gradient(135deg, #007a5e 0% 33%, #ce1126 33% 66%, #fcd116 66% 100%);
    overflow: hidden;
    font-family: 'Fredoka One', cursive;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0 2px, transparent 2px 14px);
    pointer-events: none;
  }

  .pied-wrap {
    position: absolute;
    pointer-events: none;
    animation: piedAnim var(--dur) ease-in-out forwards;
    transform-origin: center center;
  }

  @keyframes piedAnim {
    0%   { transform: translateY(-120px) rotate(var(--rot)) scale(0.2); opacity: 0; }
    15%  { opacity: 1; transform: translateY(0) rotate(var(--rot)) scale(1.3); }
    28%  { transform: translateY(-18px) rotate(var(--rot)) scale(1); }
    40%  { transform: translateY(8px) rotate(var(--rot)) scale(1); }
    55%  { transform: translateY(-4px) rotate(var(--rot)) scale(1); }
    70%  { transform: translateY(0px) rotate(var(--rot)) scale(1); opacity: 1; }
    85%  { opacity: 0.9; }
    100% { transform: translateY(0px) rotate(var(--rot)) scale(1); opacity: 0; }
  }

  .lena-txt {
    position: absolute;
    font-size: 26px;
    color: #fff;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    animation: popLena 4s ease-in-out forwards;
    pointer-events: none;
  }
  @keyframes popLena {
    0%   { transform: scale(0) rotate(var(--rot)); opacity: 0; }
    20%  { transform: scale(1.3) rotate(var(--rot)); opacity: 1; }
    40%  { transform: scale(0.95) rotate(var(--rot)); opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .center-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 16px 24px;
    text-align: center;
    z-index: 20;
    animation: cardPulse 3s ease-in-out infinite;
  }
  @keyframes cardPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%     { transform: translate(-50%,-50%) scale(1.03); }
  }
  .center-card .title { font-size: 36px; color: #fcd116; text-shadow: 2px 2px 0 #007a5e; letter-spacing: 2px; }
  .center-card .sub   { font-size: 18px; color: #fff; margin-top: 4px; }
  .flag-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
  .mini-flag { display: flex; width: 54px; height: 34px; border-radius: 4px; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.5); position: relative; }
  .mini-flag span { flex: 1; }
  .mini-flag .fstar { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; }

  .counter { position: absolute; bottom: 12px; right: 16px; font-size: 15px; color: rgba(255,255,255,0.85); text-shadow: 1px 1px 0 rgba(0,0,0,0.4); }

  .confetti {
    position: absolute;
    border-radius: 2px;
    pointer-events: none;
    animation: cFall linear forwards;
  }
  @keyframes cFall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(560px) rotate(600deg); opacity: 0; }
  }
</style>

<div id="scene">
  <div class="overlay"></div>

  <div class="center-card">
    <div class="title">✨ Lena Lou ✨</div>
    <div class="sub">Reine du Cameroun</div>
    <div class="flag-row">
      <div class="mini-flag">
        <span style="background:#007a5e"></span>
        <span style="background:#ce1126"></span>
        <span style="background:#fcd116"></span>
        <span class="fstar">⭐</span>
      </div>
    </div>
  </div>

  <div class="counter" id="ctr">🦶 0 pieds</div>
</div>
