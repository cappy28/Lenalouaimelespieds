
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #scene {
    position: relative;
    width: 100%;
    height: 540px;
    background: linear-gradient(135deg, #007a5e 0% 33%, #ce1126 33% 66%, #fcd116 66% 100%);
    overflow: hidden;
    font-family: 'Fredoka One', cursive;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0 2px, transparent 2px 14px);
    pointer-events: none;
  }

  .pied-wrap {
    position: absolute;
    pointer-events: none;
    animation: piedAnim var(--dur) ease-in-out forwards;
    transform-origin: center center;
  }

  @keyframes piedAnim {
    0%   { transform: translateY(-120px) rotate(var(--rot)) scale(0.2); opacity: 0; }
    15%  { opacity: 1; transform: translateY(0) rotate(var(--rot)) scale(1.3); }
    28%  { transform: translateY(-18px) rotate(var(--rot)) scale(1); }
    40%  { transform: translateY(8px) rotate(var(--rot)) scale(1); }
    55%  { transform: translateY(-4px) rotate(var(--rot)) scale(1); }
    70%  { transform: translateY(0px) rotate(var(--rot)) scale(1); opacity: 1; }
    85%  { opacity: 0.9; }
    100% { transform: translateY(0px) rotate(var(--rot)) scale(1); opacity: 0; }
  }

  .compliment-bubble {
    position: absolute;
    background: rgba(0,0,0,0.45);
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 18px;
    padding: 8px 14px;
    font-size: 15px;
    color: #fff;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    white-space: nowrap;
    pointer-events: none;
    animation: popCompliment 4.2s ease-in-out forwards;
    max-width: 240px;
    white-space: normal;
    text-align: center;
    line-height: 1.3;
  }

  @keyframes popCompliment {
    0%   { transform: scale(0) rotate(var(--rot)); opacity: 0; }
    18%  { transform: scale(1.15) rotate(var(--rot)); opacity: 1; }
    35%  { transform: scale(0.97) rotate(var(--rot)); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: scale(1) rotate(var(--rot)); opacity: 0; }
  }

  .center-card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 22px;
    padding: 18px 28px;
    text-align: center;
    z-index: 20;
    animation: cardPulse 3s ease-in-out infinite;
  }
  @keyframes cardPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%     { transform: translate(-50%,-50%) scale(1.04); }
  }
  .crown { font-size: 38px; line-height: 1; }
  .title { font-size: 34px; color: #fcd116; text-shadow: 2px 2px 0 #007a5e; letter-spacing: 2px; margin-top: 4px; }
  .sub   { font-size: 17px; color: #fff; margin-top: 2px; letter-spacing: 1px; }
  .flag-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
  .mini-flag { display: flex; width: 54px; height: 34px; border-radius: 4px; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.5); position: relative; }
  .mini-flag span { flex: 1; }
  .mini-flag .fstar { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; }

  .counter { position: absolute; bottom: 12px; right: 16px; font-size: 15px; color: rgba(255,255,255,0.85); text-shadow: 1px 1px 0 rgba(0,0,0,0.4); }

  .confetti {
    position: absolute;
    border-radius: 2px;
    pointer-events: none;
    animation: cFall linear forwards;
  }
  @keyframes cFall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(560px) rotate(600deg); opacity: 0; }
  }
</style>

<div id="scene">
  <div class="overlay"></div>

  <div class="center-card">
    <div class="crown">👑</div>
    <div class="title">Lena la Reine</div>
    <div class="sub">La Queen du Cameroun 🇨🇲</div>
    <div class="flag-row">
      <div class="mini-flag">
        <span style="background:#007a5e"></span>
        <span style="background:#ce1126"></span>
        <span style="background:#fcd116"></span>
        <span class="fstar">⭐</span>
      </div>
    </div>
  </div>

  <div class="counter" id="ctr">🦶 0 pieds</div>
</div>

<script>
const scene = document.getElementById('scene');
const ctr = document.getElementById('ctr');
let total = 0;

function makeFoot(skinTone, nailColor, flipped, size) {
  const s = size || 90;
  const f = flipped ? `scale(-1,1) translate(-${s},0)` : '';
  const skins = {
    light:  { base:'#f2c9a0', shadow:'#e0a870', nail:'#f8c9d0' },
    medium: { base:'#d4956a', shadow:'#b87040', nail:'#e8b0a0' },
    dark:   { base:'#8B5E3C', shadow:'#6b3f20', nail:'#c09080' },
  };
  const sk = skins[skinTone] || skins.medium;
  const nc = nailColor || sk.nail;
  return `<svg width="${s}" height="${s*1.1}" viewBox="0 0 90 100" xmlns="http://www.w3.org/2000/svg">
  <g transform="${f}">
    <ellipse cx="45" cy="85" rx="30" ry="13" fill="${sk.shadow}" opacity="0.4"/>
    <path d="M18,75 Q14,55 16,40 Q18,22 28,18 Q38,14 48,16 Q60,18 64,30 Q70,46 68,65 Q66,78 58,84 Q48,90 34,88 Q22,86 18,75 Z" fill="${sk.base}"/>
    <path d="M18,75 Q16,65 18,55" stroke="${sk.shadow}" stroke-width="2" fill="none" opacity="0.5"/>
    <ellipse cx="42" cy="84" rx="18" ry="8" fill="${sk.shadow}" opacity="0.3"/>
    <ellipse cx="20" cy="23" rx="8.5" ry="9.5" fill="${sk.base}" stroke="${sk.shadow}" stroke-width="0.5"/>
    <ellipse cx="20" cy="19" rx="6" ry="4.5" fill="${nc}"/>
    <line x1="14.5" y1="19" x2="25.5" y2="19" stroke="${sk.shadow}" stroke-width="0.4" opacity="0.5"/>
    <ellipse cx="34" cy="18" rx="6.5" ry="8" fill="${sk.base}" stroke="${sk.shadow}" stroke-width="0.5"/>
    <ellipse cx="34" cy="14.5" rx="4.5" ry="3.5" fill="${nc}"/>
    <ellipse cx="46" cy="18" rx="6" ry="7.5" fill="${sk.base}" stroke="${sk.shadow}" stroke-width="0.5"/>
    <ellipse cx="46" cy="14.5" rx="4" ry="3" fill="${nc}"/>
    <ellipse cx="57" cy="21" rx="5.5" ry="7" fill="${sk.base}" stroke="${sk.shadow}" stroke-width="0.5"/>
    <ellipse cx="57" cy="17.5" rx="3.5" ry="2.8" fill="${nc}"/>
    <ellipse cx="66" cy="28" rx="4.5" ry="6" fill="${sk.base}" stroke="${sk.shadow}" stroke-width="0.5"/>
    <ellipse cx="66" cy="25" rx="3" ry="2.5" fill="${nc}"/>
    <line x1="27" y1="26" x2="29" y2="65" stroke="${sk.shadow}" stroke-width="0.6" opacity="0.3"/>
    <line x1="40" y1="25" x2="41" y2="65" stroke="${sk.shadow}" stroke-width="0.6" opacity="0.3"/>
    <line x1="52" y1="27" x2="52" y2="65" stroke="${sk.shadow}" stroke-width="0.6" opacity="0.3"/>
    <line x1="62" y1="34" x2="61" y2="65" stroke="${sk.shadow}" stroke-width="0.6" opacity="0.3"/>
    <ellipse cx="35" cy="45" rx="6" ry="14" fill="white" opacity="0.08" transform="rotate(-5,35,45)"/>
  </g>
</svg>`;
}

const skinTones = ['light','medium','dark','light','medium'];
const nailColors = ['#ff9eb5','#ce1126','#fcd116','#a78bfa','#ff6b6b','#007a5e','#fff','#f472b6'];

const compliments = [
  '👑 T\'es la plus belle !',
  '✨ Tu rayonnes Lena !',
  '💛 Trop magnifique !',
  '🌹 Une vraie déesse !',
  '💎 La perfection c\'est toi',
  '🔥 Tellement stylée !',
  '🌟 Tu brilles fort !',
  '💚 Beauté naturelle !',
  '👸 Notre Queen adorée',
  '💋 Irrésistible Lena !',
  '🏆 La meilleure de toutes',
  '🌺 Fleur du Cameroun !',
  '✨ Élégante & puissante',
  '💫 Tu illumines tout',
  '❤️ On t\'adore Lena !',
  '🦋 Belle comme un rêve',
  '🌸 Trop trop belle !!',
  '👑 Reine incontestée !',
  '💪 Forte & magnifique',
  '🎀 La plus swag de toutes',
];

const bubbleColors = [
  'rgba(0,122,94,0.75)',
  'rgba(206,17,38,0.75)',
  'rgba(180,140,0,0.75)',
  'rgba(100,50,160,0.7)',
  'rgba(0,80,180,0.7)',
];

const confColors = ['#007a5e','#ce1126','#fcd116','#fff','#ff9eb5','#a78bfa'];

function rand(a,b){ return Math.random()*(b-a)+a; }

function spawnPied() {
  const wrap = document.createElement('div');
  wrap.className = 'pied-wrap';
  const x = rand(2, 80);
  const y = rand(2, 72);
  const rot = rand(-50, 50);
  const size = rand(65, 110);
  const skin = skinTones[Math.floor(Math.random()*skinTones.length)];
  const nail = nailColors[Math.floor(Math.random()*nailColors.length)];
  const flip = Math.random() > 0.5;
  const dur = rand(3.2, 4.2).toFixed(1) + 's';
  wrap.style.left = x + '%';
  wrap.style.top = y + '%';
  wrap.style.setProperty('--rot', rot + 'deg');
  wrap.style.setProperty('--dur', dur);
  wrap.innerHTML = makeFoot(skin, nail, flip, size);
  scene.appendChild(wrap);
  total++;
  ctr.textContent = '🦶 ' + total + ' pieds !';
  setTimeout(() => wrap.remove(), 4300);
}

function spawnCompliment() {
  const el = document.createElement('div');
  el.className = 'compliment-bubble';
  el.style.left = rand(2, 68) + '%';
  el.style.top = rand(3, 75) + '%';
  el.style.setProperty('--rot', rand(-12, 12) + 'deg');
  el.style.background = bubbleColors[Math.floor(Math.random()*bubbleColors.length)];
  el.style.fontSize = rand(13, 19) + 'px';
  el.textContent = compliments[Math.floor(Math.random()*compliments.length)];
  scene.appendChild(el);
  setTimeout(() => el.remove(), 4300);
}

function spawnConfetti() {
  for (let i = 0; i < 8; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = rand(0,100) + '%';
    c.style.top = '-12px';
    c.style.width = rand(7,13) + 'px';
    c.style.height = rand(7,13) + 'px';
    c.style.background = confColors[Math.floor(Math.random()*confColors.length)];
    c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    c.style.animationDuration = rand(2,4.5) + 's';
    scene.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

function burst() {
  const n = Math.floor(rand(3, 7));
  for (let i = 0; i < n; i++) setTimeout(spawnPied, i * 160);
  const nc = Math.floor(rand(2, 5));
  for (let i = 0; i < nc; i++) setTimeout(spawnCompliment, i * 200 + 100);
  spawnConfetti();
}

burst();
setInterval(burst, 3000);
</script>
